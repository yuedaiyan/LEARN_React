<!doctype html>
<html>
    <head>
        <title>chatbot</title>
    </head>
    <body>
        <div class="js-container"></div>
        <script src="react-basics.js"></script>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function ChatInput() {
                return (
                    <>
                        <input placeholder="Send a message to Chatbot" size="30" />
                        <button>Send</button>
                    </>
                );
            }

            function ChatMessage({ message, sender }) {
                // const { message, sender } = props;

                // if (sender === "user") {
                //     return (
                //         <div>
                //             <p>{message}</p>
                //             <img width="50" src="user.png" />
                //         </div>
                //     );
                // } else if (sender === "robot") {
                //     return (
                //         <div>
                //             <img width="50" src="robot.png" />
                //             <p>{message}</p>
                //         </div>
                //     );
                // }
                return (
                    <div>
                        <p>{sender === "robot" && <img width="50" src="robot.png" />}</p>
                        {message}
                        <p>{sender === "user" && <img width="50" src="user.png" />}</p>
                    </div>
                );
            }

            function App() {
                return (
                    <>
                        <ChatInput />
                        <ChatMessage message="hello chatbot" sender="user" />
                        <ChatMessage message="Hlello! How can I help you?" sender="robot" />
                        <ChatMessage message="can you get me todays date?" sender="user" />
                        <ChatMessage message="Today is March 27" sender="robot" />
                    </>
                );
            }

            const container = document.querySelector(".js-container");
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
